    <h1>二手手機面交要注意什麼？</h1>
    <p class="lead">二手手機面交前的安全檢查表：公開地點、序號、外觀、驗收方式、付款確認與現場殺價風險。</p>
    <div class="preview-card article-card">
      <h2>重點檢查</h2>
      <ul><li>約公開場所，不臨時改到人煙稀少地點。</li><li>面交前先確認型號、容量、電池健康度與序號。</li><li>交易條件先寫好，減少現場殺價與拉扯。</li><li>驗貨後再確認交易，保留時間紀錄。</li></ul>
    </div>
