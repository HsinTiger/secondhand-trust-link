    <p class="lead">二手商品爭議常見在商品不符、瑕疵與運送損壞。開箱影片、包裝照與序號照可以讓爭議處理更清楚。</p>
    <div class="preview-card article-card">
      <h2>重點檢查</h2>
      <ul><li>高單價 3C、相機、模型、公仔建議保留開箱影片。</li><li>賣方出貨前拍商品狀態與包裝照。</li><li>買方開箱時拍外箱、封條、商品狀態。</li><li>影片不是保證勝訴，而是降低各說各話。</li></ul>
