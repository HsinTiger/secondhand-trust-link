name = "mochilock-api"
main = "src/worker.js"
compatibility_date = "2026-06-26"

[assets]
directory = "."
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "mochilock-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[vars]
APP_ENV = "production"
ALLOWED_ORIGIN = "https://hsintiger.github.io"
